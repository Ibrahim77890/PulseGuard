apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sAIAgentRequiredAnnotations
metadata:
  name: pulseguard-ai-agent-required-annotations
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
      - apiGroups: ["batch"]
        kinds: ["Job", "CronJob"]
  parameters:
    annotations:
      - security.pulseguard.dev/egress-allowlist
      - security.pulseguard.dev/data-classification
