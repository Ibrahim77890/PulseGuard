apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sAIAgentReadOnlyRootFS
metadata:
  name: pulseguard-ai-agent-read-only-rootfs
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
      - apiGroups: ["batch"]
        kinds: ["Job", "CronJob"]
