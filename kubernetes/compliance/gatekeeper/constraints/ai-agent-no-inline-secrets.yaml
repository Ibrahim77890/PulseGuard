apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sAIAgentNoInlineSecrets
metadata:
  name: pulseguard-ai-agent-no-inline-secrets
spec:
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
      - apiGroups: ["batch"]
        kinds: ["Job", "CronJob"]
  parameters:
    protectedEnvNames:
      - OPENROUTER_API_KEY
      - OPENAI_API_KEY
      - ANTHROPIC_API_KEY
