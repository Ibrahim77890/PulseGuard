apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8saiaagentnoinlinesecrets
spec:
  crd:
    spec:
      names:
        kind: K8sAIAgentNoInlineSecrets
      validation:
        openAPIV3Schema:
          type: object
          properties:
            protectedEnvNames:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8saiaagentnoinlinesecrets

        protected_names := {name | name := input.parameters.protectedEnvNames[_]}

        is_ai_agent {
          input.review.object.spec.template.metadata.labels["workload-type"] == "ai-agent"
        }

        violation[{"msg": msg}] {
          is_ai_agent
          container := input.review.object.spec.template.spec.containers[_]
          env := container.env[_]
          protected_names[env.name]
          env.value
          msg := sprintf("AI agent container %q must not inline protected env var %q", [container.name, env.name])
        }
