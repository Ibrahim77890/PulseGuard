apiVersion: templates.gatekeeper.sh/v1beta1
kind: ConstraintTemplate
metadata:
  name: k8saiaagentreadonlyrootfs
spec:
  crd:
    spec:
      names:
        kind: K8sAIAgentReadOnlyRootFS
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8saiaagentreadonlyrootfs

        is_ai_agent {
          input.review.object.spec.template.metadata.labels["workload-type"] == "ai-agent"
        }

        violation[{"msg": msg}] {
          is_ai_agent
          container := input.review.object.spec.template.spec.containers[_]
          not container.securityContext.readOnlyRootFilesystem
          msg := sprintf("AI agent container %q must set securityContext.readOnlyRootFilesystem=true", [container.name])
        }

        violation[{"msg": msg}] {
          is_ai_agent
          container := input.review.object.spec.template.spec.containers[_]
          container.securityContext.allowPrivilegeEscalation
          msg := sprintf("AI agent container %q must set securityContext.allowPrivilegeEscalation=false", [container.name])
        }
