apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-llm-agent-observability
  namespace: observability
  labels:
    grafana_dashboard: "1"
    app: grafana
data:
  llm-agent-observability.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "targets": [
            {
              "expr": "sum(rate(pulseguard_aiops_requests_total[5m]))",
              "refId": "A"
            }
          ],
          "title": "Requests Per Second",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 0
          },
          "id": 2,
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(pulseguard_aiops_request_latency_seconds_bucket[5m])) by (le))",
              "refId": "A"
            }
          ],
          "title": "P95 Response Time",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "id": 3,
          "targets": [
            {
              "expr": "sum(increase(pulseguard_aiops_llm_cost_usd_total[24h]))",
              "refId": "A"
            }
          ],
          "title": "24h LLM Cost",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 4,
          "targets": [
            {
              "expr": "sum(rate(pulseguard_aiops_tool_calls_total[5m])) by (tool, outcome)",
              "legendFormat": "{{tool}} {{outcome}}",
              "refId": "A"
            }
          ],
          "title": "Tool Calls By Outcome",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 10,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 5,
          "targets": [
            {
              "expr": "sum(rate(pulseguard_aiops_llm_tokens_total[5m])) by (model, direction)",
              "legendFormat": "{{model}} {{direction}}",
              "refId": "A"
            }
          ],
          "title": "Token Throughput",
          "type": "timeseries"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 18
          },
          "id": 6,
          "targets": [
            {
              "expr": "pulseguard_aiops_eval_quality_score",
              "refId": "A"
            }
          ],
          "title": "Eval Quality Score",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 18
          },
          "id": 7,
          "targets": [
            {
              "expr": "pulseguard_aiops_eval_tool_correctness_score",
              "refId": "A"
            }
          ],
          "title": "Tool Correctness Score",
          "type": "stat"
        },
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "unit": "currencyUSD"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 18
          },
          "id": 8,
          "targets": [
            {
              "expr": "pulseguard_aiops_eval_cost_per_case_usd",
              "refId": "A"
            }
          ],
          "title": "Eval Cost Per Case",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "pulseguard",
        "phase-09",
        "aiops",
        "llm"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "PulseGuard LLM And Agent Observability",
      "uid": "pulseguard-llm-agent-observability",
      "version": 1
    }
