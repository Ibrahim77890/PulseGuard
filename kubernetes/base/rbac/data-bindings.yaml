apiVersion: v1
kind: ServiceAccount
metadata:
  name: viewer
  namespace: data
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ci-deployer
  namespace: data
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: namespace-admin
  namespace: data
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: viewer-binding
  namespace: data
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pulseguard-viewer
subjects:
  - kind: ServiceAccount
    name: viewer
    namespace: data
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployer-binding
  namespace: data
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pulseguard-deployer
subjects:
  - kind: ServiceAccount
    name: ci-deployer
    namespace: data
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: namespace-admin-binding
  namespace: data
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pulseguard-namespace-admin
subjects:
  - kind: ServiceAccount
    name: namespace-admin
    namespace: data
