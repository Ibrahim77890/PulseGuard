name: aiops-assistant

on:
  workflow_dispatch:
  push:
    paths:
      - "aiops-assistant/**"
      - "docs/runbooks/**"
      - "docs/postmortems/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build assistant image
        run: docker build -f aiops-assistant/Dockerfile .
